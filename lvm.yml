---
 - name: create lvm
   hosts: all
   tasks:
     - name: Print the gateway for each host when defined
       debug:
         msg: device not present
       when: ansible_lvm.vgs.research is not defined

     - name: Create a logical volume of 512m
       community.general.lvol:
         vg: research
         lv: data
         size: 1500m
       register: lv_create
       ignore_errors: yes

     - name: show error when 1500m fails
       debug:
         msg: "Could not create logical volume of 1500m"
       when: lv_create is failed

     - name: create lv 800m fallback
       lvol:
         vg: research
         lv: data
         size: 800m
       when: lv_create is failed

     - name: Create a ext4 filesystem on /dev/vdb and check disk blocks
       community.general.filesystem:
         fstype: ext4
         dev: /dev/research/data
